services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: zeko123
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backup.sql:/docker-entrypoint-initdb.d/backup.sql

  backend:
    build: ./Backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:zeko123@postgres:5432/ecommerce_db
      JWT_SECRET: lookatmevibinlesgomanandplayminecraftandhavefun
      MONGO_URI: ${MONGO_URI}
      PORT: 5000
    depends_on:
      - postgres
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build: ./Frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data: